name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version to test (e.g. 1.1.7)'
        required: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}

      - name: Start container
        run: |
          docker run -d --name smoke-test-container -p 8080:80 ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}
          sleep 3

      - name: Run smoke test
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke test failed — expected 200, got $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Check security headers
        run: |
          HEADERS=$(curl -s -I http://localhost:8080)
          echo "$HEADERS"
          for HEADER in "X-Content-Type-Options" "X-Frame-Options" "X-XSS-Protection" "Referrer-Policy"; do
            if echo "$HEADERS" | grep -qi "$HEADER"; then
              echo "✓ $HEADER present"
            else
              echo "✗ $HEADER missing"
              exit 1
            fi
          done

      - name: Stop container
        if: always()
        run: docker rm -f smoke-test-container
